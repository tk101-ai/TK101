services:
  backend:
    build:
      context: ./backend
    container_name: tk101-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

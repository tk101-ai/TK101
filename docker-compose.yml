services:
  # --- PostgreSQL (pgvector) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tk101-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tk101}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tk101}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tk101}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- n8n (workflow automation) ---
  n8n:
    image: n8nio/n8n:latest
    container_name: tk101-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_AUTH_PASSWORD:?N8N_AUTH_PASSWORD required}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-tk101}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-tk101}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # --- Open WebUI (chat interface) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: tk101-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY required}
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: "pending"
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy

  # --- Backend API (FastAPI) ---
  backend:
    build: ./backend
    container_name: tk101-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tk101}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tk101}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      GOOGLE_YOUTUBE_API_KEY: ${GOOGLE_YOUTUBE_API_KEY:-}
      NAS_MOUNT_PATH: ${NAS_MOUNT_PATH:-/mnt/nas}
      # T5 범용 문서 자동 작성기 (v0.8.0) ----------------------------------------
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      # Langfuse (콘솔에서 키 발급 후 GitHub Secrets 등록 시 자동 반영)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
    volumes:
      # 호스트 NAS SSHFS 마운트를 컨테이너에 read-only bind. 호스트 fstab은 ro 마운트 권장.
      - ${NAS_MOUNT_PATH:-/mnt/nas}:/mnt/nas:ro
      # multilingual-e5-large(~2.2GB) 캐시. 컨테이너 재시작 시 재다운로드 방지.
      - hf_cache:/root/.cache/huggingface
      # T5 양식 산출물 + 사용자 업로드 (NAS는 ro라 별도 volume 사용).
      - form_filler_data:/var/lib/form_filler
    depends_on:
      postgres:
        condition: service_healthy

  # --- Frontend (React) ---
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: tk101-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  # --- Langfuse (LLM observability) ---
  langfuse:
    image: langfuse/langfuse:2
    container_name: tk101-langfuse
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tk101}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:?LANGFUSE_SECRET required}
      SALT: ${LANGFUSE_SALT:?LANGFUSE_SALT required}
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  webui_data:
  hf_cache:
  form_filler_data:

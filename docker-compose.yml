services:
  # --- PostgreSQL (pgvector) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tk101-postgres
    restart: unless-stopped
    ports:
      # 2026-05-19: 외부 노출 제거 — 호스트 자체에서만 접근 가능 (psql, pg_dump 등).
      # docker network 내부 컨테이너는 영향 없음 (서비스명 'postgres'로 접근).
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tk101}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tk101}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tk101}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- n8n (workflow automation) ---
  n8n:
    image: n8nio/n8n:latest
    container_name: tk101-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_AUTH_PASSWORD:?N8N_AUTH_PASSWORD required}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-tk101}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-tk101}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY required}
      # nginx reverse proxy at /n8n/ (frontend:8080) — see frontend/nginx.conf
      N8N_PATH: /n8n/
      N8N_PROTOCOL: http
      N8N_HOST: ${N8N_PUBLIC_HOST:-43.155.202.112}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://43.155.202.112:8080/n8n/}
      N8N_PROXY_HOPS: "1"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # --- Open WebUI (chat interface) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: tk101-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY required}
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: "pending"
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy

  # --- Backend API (FastAPI) ---
  backend:
    build: ./backend
    container_name: tk101-backend
    restart: unless-stopped
    # 2026-05-19: 외부 노출 차단 + 호스트 스크립트 호환 — 127.0.0.1 만 바인딩.
    # frontend nginx 는 docker network 내부에서 http://backend:8000 으로 프록시 (포트 매핑과 무관).
    # 호스트 자체에서 실행되는 scripts/*.sh (healthcheck, admin-token 등) 는 그대로 동작.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tk101}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tk101}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      GOOGLE_YOUTUBE_API_KEY: ${GOOGLE_YOUTUBE_API_KEY:-}
      # 마케팅 SNS — Meta(Facebook/Instagram) 게시물·댓글 수집 (Seoul Korea/seoulcity).
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v25.0}
      NAS_MOUNT_PATH: ${NAS_MOUNT_PATH:-/mnt/nas}
      # T5 범용 문서 자동 작성기 (v0.8.0) ----------------------------------------
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      # Langfuse (콘솔에서 키 발급 후 GitHub Secrets 등록 시 자동 반영)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      # T8 AI Playground — Tencent MPaaS AIGC (OpenAI-compatible 단일 endpoint).
      # 수동 모드 (디버깅용 fallback). 자동 모드 미설정 시 503.
      TENCENT_AIGC_API_KEY: ${TENCENT_AIGC_API_KEY:-}
      TENCENT_AIGC_BASE_URL: ${TENCENT_AIGC_BASE_URL:-https://text-aigc.vod-qcloud.com/v1}
      # 자동 모드 — CreateAigcApiToken (TC3-HMAC-SHA256). 권장.
      TENCENT_AIGC_SUBAPP_ID: ${TENCENT_AIGC_SUBAPP_ID:-}
      TENCENT_AIGC_SECRET_ID: ${TENCENT_AIGC_SECRET_ID:-}
      TENCENT_AIGC_SECRET_KEY: ${TENCENT_AIGC_SECRET_KEY:-}
      TENCENT_AIGC_VOD_ENDPOINT: ${TENCENT_AIGC_VOD_ENDPOINT:-vod.tencentcloudapi.com}
      TENCENT_AIGC_REGION: ${TENCENT_AIGC_REGION:-ap-seoul}
      # T9 신사업유통 텔레그램 대화 자동화 (T9 PRD 7-1) ----------------------------
      # Fernet 마스터 키 — DB의 api_id_enc/api_hash_enc 컬럼 암복호화. 없으면 페르소나 등록 시 503.
      DISTRIBUTION_FERNET_KEY: ${DISTRIBUTION_FERNET_KEY:-}
      DISTRIBUTION_TELETHON_SESSION_DIR: ${DISTRIBUTION_TELETHON_SESSION_DIR:-/var/lib/distribution/sessions}
      DISTRIBUTION_CLAUDE_MODEL: ${DISTRIBUTION_CLAUDE_MODEL:-claude-sonnet-4-6}
      # T8 Playground 미디어 영속화. 2026-05-19 부로 NAS RW 마운트로 저장.
      # 경로 패턴: {root}/{department}/{user_id}/{kind}/{task_id}.{ext}
      # 호스트 /mnt/nas-rw → NAS /volume1/TK101AI (sshfs rw 마운트).
      PLAYGROUND_MEDIA_ROOT: ${PLAYGROUND_MEDIA_ROOT:-/mnt/nas-rw/playground}
      PLAYGROUND_MEDIA_RETENTION_DAYS: ${PLAYGROUND_MEDIA_RETENTION_DAYS:-30}
    volumes:
      # 호스트 NAS SSHFS 마운트를 컨테이너에 read-only bind. 호스트 fstab은 ro 마운트 권장.
      - ${NAS_MOUNT_PATH:-/mnt/nas}:/mnt/nas:ro
      # multilingual-e5-large(~2.2GB) 캐시. 컨테이너 재시작 시 재다운로드 방지.
      - hf_cache:/root/.cache/huggingface
      # T5 양식 산출물 + 사용자 업로드 (NAS는 ro라 별도 volume 사용).
      - form_filler_data:/var/lib/form_filler
      # T9 Telethon 세션 파일 (.session) 영구 저장 — 컨테이너 재시작 시 재로그인 회피.
      - distribution_telethon_data:/var/lib/distribution
      # T9 자격증명 JSON 드롭 위치 (.local/t9_credentials.json) — 컨테이너에서 읽기 위해 mount.
      - ./.local:/srv/.local
      # T8 Playground 결과물 — 기존 backend volume 유지 (이미 만든 미디어 file_path 보존).
      - playground_media:/var/lib/playground/media
      # 2026-05-19: NAS RW bind mount. 호스트 fstab: tk101_indexer@.../TK101AI → /mnt/nas-rw.
      # 신규 결과물은 여기에 저장, NAS DSM 에서도 직관적으로 탐색 가능.
      - /mnt/nas-rw:/mnt/nas-rw:rw
    depends_on:
      postgres:
        condition: service_healthy

  # --- Frontend (React) ---
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: tk101-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - n8n

  # --- Langfuse (LLM observability) ---
  langfuse:
    image: langfuse/langfuse:2
    container_name: tk101-langfuse
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tk101}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:?LANGFUSE_SECRET required}
      SALT: ${LANGFUSE_SALT:?LANGFUSE_SALT required}
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  webui_data:
  hf_cache:
  form_filler_data:
  distribution_telethon_data:
  playground_media:

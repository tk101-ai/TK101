name: "TK101 E2E 검증 v0.1.0"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["TK101 배포 v0.2.0"]
    types:
      - completed

env:
  E2E_VERSION: "0.1.0"
  E2E_BASE_URL: "http://43.155.202.112:8080"

jobs:
  playwright:
    name: "Playwright E2E 실행 (v0.1.0)"
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: "체크아웃"
        uses: actions/checkout@v4

      - name: "Node.js 20 셋업"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "의존성 설치"
        working-directory: tests/e2e
        run: npm install

      - name: "Playwright 브라우저 설치 (chromium + 시스템 의존성)"
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: "라이브 헬스체크"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.E2E_BASE_URL }}/")
          echo "라이브 응답 코드 $STATUS"
          test "$STATUS" = "200" || test "$STATUS" = "302"

      - name: "E2E 시나리오 실행 (전체)"
        working-directory: tests/e2e
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          CI: "true"
        run: npx playwright test

      - name: "결과 아티팩트 업로드"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_id }}
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14

      - name: "검증 완료 (v0.1.0)"
        if: always()
        run: echo "TK101 E2E v0.1.0 실행 완료"

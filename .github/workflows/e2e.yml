name: "TK101 E2E 검증 v0.1.0"

on:
  # 1) 수동 실행 — 시나리오 선택 가능
  workflow_dispatch:
    inputs:
      scenario:
        description: "실행할 시나리오"
        required: true
        default: "전체"
        type: choice
        options:
          - "전체"
          - "S1 — 양식 자동 작성 전체 플로우"
          - "S2 — 다중 업로드 부분 실패"

  # 2) 배포 워크플로우 성공 후 자동 실행 — main push 흐름의 자동 회귀 검증
  workflow_run:
    workflows: ["TK101 배포 v0.2.0"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  issues: write
  actions: read

env:
  E2E_VERSION: "0.1.0"
  E2E_BASE_URL: "http://43.155.202.112:8080"

jobs:
  playwright:
    name: "Playwright E2E 실행 (v${{ env.E2E_VERSION }})"
    runs-on: self-hosted
    timeout-minutes: 30
    # 배포 실패 시 E2E 의미 없음 — 성공한 배포 또는 수동 실행에만 트리거.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - name: "체크아웃"
        uses: actions/checkout@v4

      - name: "Node.js 20 셋업"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "node_modules 캐시"
        uses: actions/cache@v4
        with:
          path: tests/e2e/node_modules
          key: ${{ runner.os }}-e2e-npm-${{ hashFiles('tests/e2e/package-lock.json', 'tests/e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-npm-

      - name: "Playwright 브라우저 캐시"
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: "의존성 설치"
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: "Playwright 브라우저 설치 (chromium + 시스템 의존성)"
        run: npx playwright install --with-deps chromium

      - name: "라이브 헬스체크"
        run: |
          set -e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.E2E_BASE_URL }}/")
          echo "라이브 응답 코드: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "라이브가 정상 응답하지 않음 — 검증 중단"
            exit 1
          fi

      - name: "E2E 시나리오 실행 — ${{ github.event.inputs.scenario || '전체 (자동 트리거)' }}"
        id: run_e2e
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          CI: "true"
        run: |
          case "${{ github.event.inputs.scenario || '전체' }}" in
            "S1"*) npx playwright test specs/s1_full_flow.spec.ts ;;
            "S2"*) npx playwright test specs/s2_partial_failure.spec.ts ;;
            *) npx playwright test ;;
          esac

      - name: "결과 아티팩트 업로드 (HTML 리포트 + 트레이스)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_id }}
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14

      - name: "검증 실패 시 자동 이슈 생성 (Phase 2 Fixer 에이전트가 처리)"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const shortSha = sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const trigger = context.eventName === 'workflow_run'
              ? `자동 (배포 후) — ${context.payload.workflow_run.head_commit?.message?.split('\n')[0] || '커밋 메시지 없음'}`
              : `수동 (${context.payload.inputs?.scenario || '전체'})`;

            const title = `[E2E 실패] ${shortSha} — 자동 회귀 검증 실패`;
            const body = [
              '## E2E 자동 검증 실패',
              '',
              `- **Commit**: \`${sha}\``,
              `- **트리거**: ${trigger}`,
              `- **워크플로우 실행 ID**: ${context.runId}`,
              `- **HTML 리포트·트레이스**: [Actions 결과 페이지](${runUrl})`,
              '',
              '## 다음 단계',
              '',
              'Phase 2 Fixer 에이전트가 셋업되면 이 이슈를 자동으로 진단·수정합니다.',
              '현재는 수동 처리 — 위 Actions 링크에서 실패 트레이스 확인 후 수정 PR.',
            ].join('\n');

            // 같은 커밋으로 이미 열린 이슈가 있으면 코멘트로 누적, 없으면 신규.
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open',
              per_page: 50,
            });
            const existing = open.find((i) => i.title.includes(shortSha));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `재실행 결과 또 실패 — [Run #${context.runId}](${runUrl})`,
              });
              core.info(`기존 이슈 #${existing.number}에 코멘트 추가`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['e2e-failure', 'auto-generated'],
              });
              core.info(`신규 이슈 #${created.number} 생성`);
            }

      - name: "검증 완료 (v${{ env.E2E_VERSION }})"
        if: always()
        run: echo "TK101 E2E v${{ env.E2E_VERSION }} 실행 완료 — 아티팩트에서 HTML 리포트·트레이스·스크린샷 확인"

name: "TK101 배포 v0.2.0"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERSION: "0.2.0"

jobs:
  deploy:
    name: "서버 배포 — 빌드 및 서비스 재시작"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: "환경변수 생성 (.env)"
        run: |
          cat > .env <<'ENVEOF'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          N8N_AUTH_USER=${{ secrets.N8N_AUTH_USER }}
          N8N_AUTH_PASSWORD=${{ secrets.N8N_AUTH_PASSWORD }}
          N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
          WEBUI_SECRET_KEY=${{ secrets.WEBUI_SECRET_KEY }}
          LANGFUSE_URL=${{ secrets.LANGFUSE_URL }}
          LANGFUSE_SECRET=${{ secrets.LANGFUSE_SECRET }}
          LANGFUSE_SALT=${{ secrets.LANGFUSE_SALT }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_YOUTUBE_API_KEY=${{ secrets.GOOGLE_YOUTUBE_API_KEY }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: "이미지 다운로드"
        run: docker compose pull

      - name: "환경변수 검증"
        run: cat -A .env

      - name: "Langfuse DB 확인/생성"
        run: |
          docker compose up -d postgres
          sleep 5
          docker compose exec -T postgres psql -U ${POSTGRES_USER:-tk101} -tc "SELECT 1 FROM pg_database WHERE datname = 'langfuse'" | grep -q 1 || \
            docker compose exec -T postgres psql -U ${POSTGRES_USER:-tk101} -c "CREATE DATABASE langfuse"

      - name: "전체 서비스 배포 (v${{ env.VERSION }})"
        run: docker compose up -d --build --force-recreate --remove-orphans

      - name: "서비스 상태 확인"
        run: |
          echo "서비스 시작 대기 중..."
          sleep 30
          docker compose ps
          echo "--- Langfuse 로그 ---"
          docker compose logs langfuse --tail 30
          echo "--- Backend 로그 ---"
          docker compose logs backend --tail 30
          echo "--- Open WebUI 로그 ---"
          docker compose logs open-webui --tail 30

      - name: "관리자 비밀번호 초기화"
        run: |
          docker compose exec -T backend python -c "
          import asyncio
          from app.database import async_session
          from app.models.user import User
          from app.services.auth import hash_password
          from sqlalchemy import select, update

          async def reset():
              async with async_session() as db:
                  result = await db.execute(
                      update(User)
                      .where(User.email == 'admin@tk101.co.kr')
                      .values(hashed_password=hash_password('admin123'))
                  )
                  await db.commit()
                  print(f'Updated {result.rowcount} row(s)')

          asyncio.run(reset())
          "

      - name: "배포 완료 (v${{ env.VERSION }})"
        run: echo "TK101 v${{ env.VERSION }} 배포 완료"

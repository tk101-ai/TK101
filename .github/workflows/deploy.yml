name: "TK101 배포 v0.2.0"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERSION: "0.2.0"

jobs:
  deploy:
    name: "서버 배포 — 빌드 및 서비스 재시작"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: "환경변수 생성 (.env)"
        run: |
          cat > .env <<'ENVEOF'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          N8N_AUTH_USER=${{ secrets.N8N_AUTH_USER }}
          N8N_AUTH_PASSWORD=${{ secrets.N8N_AUTH_PASSWORD }}
          N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
          WEBUI_SECRET_KEY=${{ secrets.WEBUI_SECRET_KEY }}
          LANGFUSE_URL=${{ secrets.LANGFUSE_URL }}
          LANGFUSE_SECRET=${{ secrets.LANGFUSE_SECRET }}
          LANGFUSE_SALT=${{ secrets.LANGFUSE_SALT }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_YOUTUBE_API_KEY=${{ secrets.GOOGLE_YOUTUBE_API_KEY }}
          INTERNAL_API_TOKEN=${{ secrets.TK101_INTERNAL_API_TOKEN }}
          NAS_MOUNT_PATH=/mnt/nas
          DISTRIBUTION_FERNET_KEY=${{ secrets.DISTRIBUTION_FERNET_KEY }}
          TENCENT_AIGC_SUBAPP_ID=${{ secrets.TENCENT_AIGC_SUBAPP_ID }}
          TENCENT_AIGC_SECRET_ID=${{ secrets.TENCENT_AIGC_SECRET_ID }}
          TENCENT_AIGC_SECRET_KEY=${{ secrets.TENCENT_AIGC_SECRET_KEY }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: "이미지 다운로드"
        run: docker compose pull

      - name: "환경변수 검증"
        run: cat -A .env

      - name: "Langfuse DB 확인/생성"
        run: |
          docker compose up -d postgres
          sleep 5
          docker compose exec -T postgres psql -U ${POSTGRES_USER:-tk101} -tc "SELECT 1 FROM pg_database WHERE datname = 'langfuse'" | grep -q 1 || \
            docker compose exec -T postgres psql -U ${POSTGRES_USER:-tk101} -c "CREATE DATABASE langfuse"

      - name: "전체 서비스 배포 (v${{ env.VERSION }})"
        run: docker compose up -d --build --force-recreate --remove-orphans

      - name: "DB 마이그레이션 적용 (idempotent)"
        # alembic upgrade head 는 이미 head 상태면 no-op. 새 마이그레이션만 적용됨.
        # 예전엔 워크플로우에 없어서 누락됐는데 T9 부터 자동화.
        run: |
          echo "Backend 가 postgres 연결 확보 대기 (15초)..."
          sleep 15
          docker compose exec -T backend alembic upgrade head

      - name: "T9 신사업유통 시드 (idempotent)"
        # 페르소나 placeholder 2종 + 시나리오 5종. 이미 존재하면 skip.
        # 실패해도 배포는 성공으로 둠 (모듈 미사용 환경 가정).
        run: |
          docker compose exec -T backend python -m app.services.distribution.seeds \
            || echo "[INFO] T9 시드 모듈 없거나 이미 시드됨 — 건너뜀"

      - name: "서비스 상태 확인"
        run: |
          echo "서비스 시작 대기 중..."
          sleep 30
          docker compose ps
          echo "--- Langfuse 로그 ---"
          docker compose logs langfuse --tail 30
          echo "--- Backend 로그 ---"
          docker compose logs backend --tail 30
          echo "--- Open WebUI 로그 ---"
          docker compose logs open-webui --tail 30

      - name: "관리자 비밀번호 초기화"
        run: |
          docker compose exec -T backend python -c "
          import asyncio
          from app.database import async_session
          from app.models.user import User
          from app.services.auth import hash_password
          from sqlalchemy import select, update

          async def reset():
              async with async_session() as db:
                  result = await db.execute(
                      update(User)
                      .where(User.email == 'admin@tk101.co.kr')
                      .values(hashed_password=hash_password('admin123'))
                  )
                  await db.commit()
                  print(f'Updated {result.rowcount} row(s)')

          asyncio.run(reset())
          "

      - name: "헬스체크 (NAS PoC v0.6.x)"
        # 코드 패치/마운트/API/torch CPU 한 번에 검증. 실패해도 배포 자체는 성공으로 둠.
        run: |
          chmod +x scripts/*.sh
          ./scripts/healthcheck.sh || echo "[WARN] 헬스체크에서 일부 항목 실패. 위 출력 확인 필요."

      - name: "배포 완료 (v${{ env.VERSION }})"
        run: echo "TK101 v${{ env.VERSION }} 배포 완료"

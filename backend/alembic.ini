# Alembic 설정 (DB 마이그레이션)
#
# 사용:
#   uv run alembic revision --autogenerate -m "add user table"
#   uv run alembic upgrade head
#   uv run alembic downgrade -1
#
# 주의: 실제 DATABASE_URL은 alembic/env.py에서 app.config를 통해 로드 (환경변수 사용).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# 마이그레이션 파일 이름 포맷: YYYYMMDDHHmm_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d_%%(slug)s

[post_write_hooks]
# 마이그레이션 파일 자동 포맷
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[project]
name = "tk101-backend"
version = "0.1.0"
description = "TK101 AI Platform Backend (FastAPI, Clean Architecture)"
authors = [
    { name = "TK101", email = "junki7853@users.noreply.github.com" }
]
readme = "../README.md"
requires-python = ">=3.12"

dependencies = [
    # Web framework
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",

    # Config / validation
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",

    # Database
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",         # async driver
    "psycopg[binary]>=3.2.3",  # sync driver (Alembic용)
    "alembic>=1.14.0",

    # Cache / Redis
    "redis[hiredis]>=5.2.0",

    # Auth (Sprint 1에서 실제 사용)
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "bcrypt<4.1",  # passlib 호환성

    # Rate limiting
    "slowapi>=0.1.9",

    # LLM (Sprint 2에서 실제 사용)
    "anthropic>=0.39.0",

    # Utilities
    "python-multipart>=0.0.17",
    "httpx>=0.28.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=6.0.0",
    "httpx>=0.28.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "types-python-jose>=3.3.4",
    "types-passlib>=1.7.7",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "ASYNC", # flake8-async
]
ignore = [
    "E501",  # line too long (ruff format이 처리)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]
known-third-party = ["alembic"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = [
    "--strict-markers",
    "-ra",
]

[tool.coverage.run]
source = ["app"]
branch = true
omit = [
    "app/main.py",
    "*/__init__.py",
    "tests/*",
    "alembic/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

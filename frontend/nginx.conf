server {
    listen 80;
    client_max_body_size 220m;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 문서 생성(docgen)·매핑 등 LLM 호출은 임베더 콜드로딩+다섹션 생성으로
        # 기본 60초를 넘길 수 있다 → 504 차단 방지를 위해 5분으로 상향.
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # n8n reverse proxy with admin guard
    # backend admin-check returns 200 only for admin role; 401/403 blocks access.
    location /n8n/ {
        auth_request /__n8n_auth_check;
        auth_request_set $auth_user $upstream_http_x_user_email;

        # WebSocket support for n8n editor.
        proxy_pass http://n8n:5678/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # internal subrequest: forwards Cookie / Authorization so backend can identify admin user.
    location = /__n8n_auth_check {
        internal;
        proxy_pass http://backend:8000/api/auth/admin-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }
}
